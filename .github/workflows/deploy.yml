name: Deploy
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: npm ci
      - run: pip install requests Pillow

      - run: node scripts/fetch-data.js
      - run: python scripts/fetch-badges.py

      - run: |
          git config user.name "bot"
          git config user.email "bot@noreply.github.com"
          git add public/badges/ scripts/badge-map.json
          git diff --cached --quiet || git commit -m "sync badges [skip ci]" && git push

      - run: npm run build

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: buffstreamsbackup.world
